    <style>
      :root {
        --night: #05070b;
        --midnight: #080d16;
        --gold: #f4b942;
        --crimson: #b71932;
        --stadium: #f5f7fa;
        --cyan: #22d3ee;
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--night);
        color: var(--stadium);
        font-family: "Inter", system-ui, sans-serif;
        overflow-x: hidden;
      }

      body::selection,
      ::selection {
        background: rgba(244, 185, 66, 0.9);
        color: #05070b;
      }

      body::-webkit-scrollbar {
        width: 11px;
      }

      body::-webkit-scrollbar-track {
        background: #030407;
      }

      body::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, var(--gold), rgba(183, 25, 50, 0.9));
        border: 3px solid #030407;
        border-radius: 999px;
      }

      a,
      button {
        -webkit-tap-highlight-color: transparent;
      }

      a:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--gold);
        outline-offset: 4px;
      }

      .font-display {
        font-family: "Barlow Condensed", Impact, sans-serif;
        letter-spacing: 0;
      }

      .page-grain::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 60;
        pointer-events: none;
        opacity: 0.12;
        mix-blend-mode: screen;
        background-image:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08) 0 1px, transparent 1px),
          radial-gradient(circle at 70% 40%, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px);
        background-size: 38px 38px, 53px 53px;
      }

      .hero-scene {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 22% 17%, rgba(34, 211, 238, 0.12), transparent 22%),
          radial-gradient(circle at 80% 16%, rgba(244, 185, 66, 0.13), transparent 20%),
          radial-gradient(circle at 75% 62%, rgba(183, 25, 50, 0.21), transparent 34%),
          linear-gradient(180deg, #05070b 0%, #080d16 42%, #05070b 100%);
      }

      .hero-scene::before {
        content: "";
        position: absolute;
        inset: -12% -8%;
        background:
          linear-gradient(102deg, transparent 0 7%, rgba(245, 247, 250, 0.13) 8%, transparent 16%),
          linear-gradient(78deg, transparent 0 73%, rgba(245, 247, 250, 0.14) 78%, transparent 88%),
          radial-gradient(ellipse at 50% 74%, rgba(245, 247, 250, 0.09), transparent 24%),
          radial-gradient(ellipse at 50% 84%, rgba(244, 185, 66, 0.15), transparent 26%);
        filter: blur(0.2px);
        opacity: 0.88;
        transform: translate3d(var(--parallax-x, 0px), var(--parallax-y, 0px), 0);
        transition: transform 0.5s ease-out;
      }

      .hero-scene::after {
        content: "";
        position: absolute;
        left: -10%;
        right: -10%;
        bottom: 7%;
        height: 32%;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(245, 247, 250, 0.08) 0 4px,
            transparent 4px 21px
          ),
          linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.62) 45%, rgba(0, 0, 0, 0.95));
        clip-path: polygon(0 30%, 100% 16%, 100% 100%, 0 100%);
        opacity: 0.46;
      }

      .stadium-rim {
        position: absolute;
        left: 50%;
        bottom: 10%;
        width: min(1200px, 120vw);
        height: 330px;
        transform: translateX(-50%);
        border-radius: 50% 50% 0 0 / 64% 64% 0 0;
        border-top: 1px solid rgba(245, 247, 250, 0.14);
        background:
          radial-gradient(ellipse at center, rgba(245, 247, 250, 0.11), transparent 42%),
          linear-gradient(180deg, rgba(245, 247, 250, 0.05), transparent 60%);
        opacity: 0.74;
      }

      .pitch-lines {
        position: absolute;
        left: 50%;
        bottom: -5%;
        width: min(860px, 96vw);
        height: 280px;
        transform: translateX(-50%) perspective(520px) rotateX(62deg);
        transform-origin: bottom;
        border: 1px solid rgba(244, 185, 66, 0.38);
        border-bottom: 0;
        background:
          linear-gradient(90deg, transparent 49.5%, rgba(245, 247, 250, 0.2) 50%, transparent 50.5%),
          repeating-linear-gradient(90deg, rgba(244, 185, 66, 0.1) 0 1px, transparent 1px 80px);
        box-shadow: 0 -20px 70px rgba(244, 185, 66, 0.12);
        opacity: 0.72;
      }

      .fog-layer {
        position: absolute;
        inset: 20% -18% 2%;
        background:
          radial-gradient(ellipse at 30% 52%, rgba(245, 247, 250, 0.11), transparent 38%),
          radial-gradient(ellipse at 72% 48%, rgba(245, 247, 250, 0.09), transparent 34%),
          linear-gradient(180deg, transparent, rgba(245, 247, 250, 0.07), transparent);
        filter: blur(20px);
        animation: fogDrift 19s ease-in-out infinite alternate;
        opacity: 0.7;
      }

      .batter-silhouette {
        position: absolute;
        right: clamp(0rem, 8vw, 8rem);
        bottom: 7%;
        width: clamp(210px, 29vw, 420px);
        height: clamp(330px, 48vw, 620px);
        opacity: 0.62;
        filter: drop-shadow(0 0 48px rgba(244, 185, 66, 0.13));
        transform: translate3d(calc(var(--cursor-x, 0px) * 0.55), calc(var(--cursor-y, 0px) * 0.55), 0);
        transition: transform 0.45s ease-out;
      }

      .batter-silhouette .head {
        position: absolute;
        top: 8%;
        left: 48%;
        width: 23%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #020305;
        box-shadow: inset 8px -8px 0 rgba(245, 247, 250, 0.04);
      }

      .batter-silhouette .body {
        position: absolute;
        top: 28%;
        left: 42%;
        width: 25%;
        height: 35%;
        border-radius: 46% 42% 38% 36%;
        background: #020305;
        transform: rotate(-9deg);
      }

      .batter-silhouette .front-leg,
      .batter-silhouette .back-leg,
      .batter-silhouette .front-arm,
      .batter-silhouette .back-arm,
      .batter-silhouette .bat {
        position: absolute;
        background: #020305;
        transform-origin: top center;
      }

      .batter-silhouette .front-leg {
        width: 9%;
        height: 35%;
        left: 49%;
        top: 59%;
        border-radius: 999px;
        transform: rotate(-16deg);
      }

      .batter-silhouette .back-leg {
        width: 9%;
        height: 35%;
        left: 60%;
        top: 58%;
        border-radius: 999px;
        transform: rotate(20deg);
      }

      .batter-silhouette .front-arm {
        width: 7%;
        height: 28%;
        left: 35%;
        top: 32%;
        border-radius: 999px;
        transform: rotate(42deg);
      }

      .batter-silhouette .back-arm {
        width: 7%;
        height: 26%;
        left: 58%;
        top: 31%;
        border-radius: 999px;
        transform: rotate(-45deg);
      }

      .batter-silhouette .bat {
        width: 7%;
        height: 52%;
        left: 24%;
        top: 4%;
        border-radius: 999px 999px 12px 12px;
        transform: rotate(-38deg);
        box-shadow: 0 0 32px rgba(244, 185, 66, 0.08);
      }

      .cricket-ball {
        position: absolute;
        width: clamp(68px, 8vw, 126px);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 28%, rgba(255, 168, 168, 0.42), transparent 21%),
          radial-gradient(circle at 74% 72%, rgba(47, 0, 8, 0.58), transparent 38%),
          linear-gradient(135deg, #c42339, #67101d 64%, #32050c);
        box-shadow:
          0 0 36px rgba(183, 25, 50, 0.52),
          0 28px 60px rgba(0, 0, 0, 0.46);
        overflow: hidden;
        will-change: transform;
      }

      .cricket-ball::before,
      .cricket-ball::after {
        content: "";
        position: absolute;
        inset: 12%;
        border: 2px solid rgba(245, 247, 250, 0.62);
        border-left-color: transparent;
        border-right-color: transparent;
        border-radius: 50%;
        transform: rotate(32deg);
      }

      .cricket-ball::after {
        inset: 18%;
        border-style: dashed;
        opacity: 0.68;
        transform: rotate(32deg) scaleX(0.78);
      }

      .particle {
        position: absolute;
        width: var(--size);
        height: var(--size);
        left: var(--left);
        top: var(--top);
        border-radius: 999px;
        background: rgba(245, 247, 250, var(--alpha));
        filter: blur(1px);
        animation: particleDrift var(--duration) ease-in-out infinite alternate;
        animation-delay: var(--delay);
        transform: translate3d(calc(var(--cursor-x, 0px) * var(--depth)), calc(var(--cursor-y, 0px) * var(--depth)), 0);
      }

      .gold-divider {
        height: 2px;
        width: min(240px, 48vw);
        background: linear-gradient(90deg, transparent, var(--gold), rgba(34, 211, 238, 0.7), transparent);
        transform-origin: left;
        box-shadow: 0 0 28px rgba(244, 185, 66, 0.34);
      }

      .shine-button {
        position: relative;
        overflow: hidden;
      }

      .shine-button::after {
        content: "";
        position: absolute;
        inset: -40% auto -40% -70%;
        width: 55%;
        transform: rotate(22deg);
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.46), transparent);
        animation: buttonShine 3.8s ease-in-out infinite;
      }

      .glass {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.045));
        border: 1px solid rgba(245, 247, 250, 0.15);
        box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(18px);
      }

      .funk-tab {
        background:
          radial-gradient(circle at 20% 10%, rgba(244, 185, 66, 0.19), transparent 24%),
          linear-gradient(135deg, rgba(255, 255, 255, 0.095), rgba(255, 255, 255, 0.035));
      }

      .score-tile {
        background:
          linear-gradient(135deg, rgba(244, 185, 66, 0.15), rgba(183, 25, 50, 0.12)),
          rgba(255, 255, 255, 0.045);
      }

      .route-bg {
        min-height: 100vh;
        background:
          radial-gradient(circle at 14% 18%, rgba(244, 185, 66, 0.18), transparent 28%),
          radial-gradient(circle at 78% 14%, rgba(34, 211, 238, 0.11), transparent 26%),
          radial-gradient(circle at 72% 72%, rgba(183, 25, 50, 0.18), transparent 34%),
          linear-gradient(180deg, #05070b, #080d16 52%, #05070b);
      }

      .mobile-menu {
        background:
          radial-gradient(circle at 18% 18%, rgba(244, 185, 66, 0.18), transparent 26%),
          radial-gradient(circle at 82% 52%, rgba(183, 25, 50, 0.22), transparent 34%),
          rgba(5, 7, 11, 0.96);
        backdrop-filter: blur(22px);
      }

      @keyframes fogDrift {
        from {
          transform: translate3d(-2%, 1%, 0) scale(1);
        }
        to {
          transform: translate3d(3%, -1%, 0) scale(1.04);
        }
      }

      @keyframes particleDrift {
        from {
          opacity: calc(var(--alpha) * 0.55);
          translate: 0 0;
        }
        to {
          opacity: var(--alpha);
          translate: var(--drift-x) var(--drift-y);
        }
      }

      @keyframes buttonShine {
        0%,
        38% {
          left: -70%;
        }
        68%,
        100% {
          left: 125%;
        }
      }

      @media (max-width: 900px) {
        .batter-silhouette {
          right: 50%;
          transform: translateX(50%);
          opacity: 0.22;
          width: 300px;
          height: 450px;
          bottom: 15%;
        }

        .hero-scene::after {
          opacity: 0.28;
        }
      }

      @media (max-width: 640px) {
        .particle:nth-child(n + 13) {
          display: none;
        }

        .pitch-lines {
          bottom: -10%;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          scroll-behavior: auto !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <noscript>CricKuru needs JavaScript enabled to show the landing page.</noscript>

    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.30.1/dist/umd/react-router-dom.production.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide-react@0.468.0/dist/umd/lucide-react.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;
      const {
        BrowserRouter,
        Link,
        NavLink,
        Route,
        Routes,
        useLocation,
        useNavigate,
      } = ReactRouterDOM;
      const MotionLib = window.Motion || {};
      const motion = MotionLib.motion || new Proxy({}, { get: (_, tag) => tag });
      const AnimatePresence = MotionLib.AnimatePresence || React.Fragment;
      const useReducedMotion = MotionLib.useReducedMotion || (() => false);

      const CricLinks = {
        matches: "https://cricheroes.com/team-profile/8626734/kurukshetra-warriors/matches",
        members: "https://cricheroes.com/team-profile/8626734/kurukshetra-warriors/members",
      };

      const fallbackIcons = {
        ArrowRight: (props) => <SvgIcon {...props}><path d="M5 12h14" /><path d="m13 5 7 7-7 7" /></SvgIcon>,
        CalendarDays: (props) => <SvgIcon {...props}><path d="M8 2v4" /><path d="M16 2v4" /><rect x="3" y="4" width="18" height="18" rx="2" /><path d="M3 10h18" /><path d="M8 14h.01" /><path d="M12 14h.01" /><path d="M16 14h.01" /><path d="M8 18h.01" /><path d="M12 18h.01" /></SvgIcon>,
        ChevronDown: (props) => <SvgIcon {...props}><path d="m6 9 6 6 6-6" /></SvgIcon>,
        CircleUserRound: (props) => <SvgIcon {...props}><path d="M18 20a6 6 0 0 0-12 0" /><circle cx="12" cy="10" r="4" /><circle cx="12" cy="12" r="10" /></SvgIcon>,
        ExternalLink: (props) => <SvgIcon {...props}><path d="M15 3h6v6" /><path d="M10 14 21 3" /><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /></SvgIcon>,
        LogIn: (props) => <SvgIcon {...props}><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" /><path d="M10 17l5-5-5-5" /><path d="M15 12H3" /></SvgIcon>,
        Menu: (props) => <SvgIcon {...props}><path d="M4 6h16" /><path d="M4 12h16" /><path d="M4 18h16" /></SvgIcon>,
        Mouse: (props) => <SvgIcon {...props}><rect x="5" y="2" width="14" height="20" rx="7" /><path d="M12 6v4" /></SvgIcon>,
        Play: (props) => <SvgIcon {...props}><polygon points="6 3 20 12 6 21 6 3" /></SvgIcon>,
        Shield: (props) => <SvgIcon {...props}><path d="M20 13c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V5l8-3 8 3v8Z" /></SvgIcon>,
        Sparkles: (props) => <SvgIcon {...props}><path d="m12 3-1.9 5.8L4 11l6.1 2.2L12 19l1.9-5.8L20 11l-6.1-2.2L12 3Z" /><path d="M5 3v4" /><path d="M3 5h4" /><path d="M19 17v4" /><path d="M17 19h4" /></SvgIcon>,
        Swords: (props) => <SvgIcon {...props}><path d="m14.5 17.5 3 3 3-3-3-3" /><path d="m3 3 8.5 8.5" /><path d="m11.5 6.5 2-2L21 12l-2 2" /><path d="m3 21 8.5-8.5" /><path d="m6.5 11.5-2 2L12 21l2-2" /></SvgIcon>,
        Trophy: (props) => <SvgIcon {...props}><path d="M8 21h8" /><path d="M12 17v4" /><path d="M7 4h10v5a5 5 0 0 1-10 0V4Z" /><path d="M5 9a3 3 0 0 1-3-3V5h5" /><path d="M19 9a3 3 0 0 0 3-3V5h-5" /></SvgIcon>,
        Users: (props) => <SvgIcon {...props}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" /><circle cx="9" cy="7" r="4" /><path d="M22 21v-2a4 4 0 0 0-3-3.87" /><path d="M16 3.13a4 4 0 0 1 0 7.75" /></SvgIcon>,
        X: (props) => <SvgIcon {...props}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></SvgIcon>,
      };

      function SvgIcon({ children, className = "", size = 20, ...props }) {
        return (
          <svg
            viewBox="0 0 24 24"
            width={size}
            height={size}
            fill="none"
            stroke="currentColor"
            strokeWidth="2"
            strokeLinecap="round"
            strokeLinejoin="round"
            className={className}
            aria-hidden="true"
            {...props}
          >
            {children}
          </svg>
        );
      }

      const Icon = { ...fallbackIcons, ...(window.LucideReact || {}) };

      const navItems = [
        { label: "Home", path: "/" },
        { label: "Arena", path: "/arena" },
        { label: "Teams", path: "/teams" },
        { label: "Players", path: "/players" },
        { label: "Tournaments", path: "/tournaments" },
        { label: "Community", path: "/community" },
      ];

      const ease = [0.22, 1, 0.36, 1];

      function useCursorParallax() {
        const [point, setPoint] = useState({ x: 0, y: 0 });

        useEffect(() => {
          const isTouch = window.matchMedia("(pointer: coarse)").matches;
          if (isTouch) return undefined;

          const onMove = (event) => {
            const x = ((event.clientX / window.innerWidth) - 0.5) * 14;
            const y = ((event.clientY / window.innerHeight) - 0.5) * 14;
            setPoint({ x, y });
            document.documentElement.style.setProperty("--cursor-x", `${x}px`);
            document.documentElement.style.setProperty("--cursor-y", `${y}px`);
            document.documentElement.style.setProperty("--parallax-x", `${x * -0.35}px`);
            document.documentElement.style.setProperty("--parallax-y", `${y * -0.2}px`);
          };

          window.addEventListener("pointermove", onMove, { passive: true });
          return () => window.removeEventListener("pointermove", onMove);
        }, []);

        return point;
      }

      function ScrollToTop() {
        const location = useLocation();

        useEffect(() => {
          if (!location.hash) {
            window.scrollTo({ top: 0, behavior: "smooth" });
          }
        }, [location.pathname]);

        return null;
      }

      function PageLoader() {
        const [show, setShow] = useState(true);

        useEffect(() => {
          const timeout = window.setTimeout(() => setShow(false), 720);
          return () => window.clearTimeout(timeout);
        }, []);

        return (
          <AnimatePresence>
            {show && (
              <motion.div
                className="fixed inset-0 z-[100] grid place-items-center bg-night"
                initial={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                transition={{ duration: 0.65, ease }}
                aria-hidden="true"
              >
                <motion.div
                  className="font-display text-5xl font-black tracking-normal"
                  initial={{ opacity: 0, y: 18, filter: "blur(12px)" }}
                  animate={{ opacity: 1, y: 0, filter: "blur(0px)" }}
                  transition={{ duration: 0.7, ease }}
                >
                  <span className="text-white">CRIC</span><span className="text-gold">KURU</span>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        );
      }

      function Logo({ onClick }) {
        return (
          <Link
            to="/"
            onClick={onClick}
            aria-label="CricKuru home"

                    <p className="mt-4 font-display text-4xl font-black text-gold">{match.score}</p>
                    <p className="mt-2 text-sm font-semibold text-white/68">{match.result}</p>
                  </article>
                ))}
              </div>
              <div className="glass rounded-[8px] p-6">
                <div className="flex items-center gap-3">
                  <div className="grid h-14 w-14 place-items-center rounded-[8px] bg-crimson/14 text-crimson">
                    <Icon.Swords size={28} />
                  </div>
                  <div>
                    <p className="text-xs font-black uppercase tracking-[0.22em] text-white/48">Official Source</p>
                    <h3 className="font-display text-3xl font-black uppercase text-white">CricHeroes Matchbook</h3>
                  </div>
                </div>
                <p className="mt-6 leading-8 text-white/68">
                  The official Kurukshetra Warriors match page is linked here so fans can open the full scorecards, match history and CricHeroes details without any fake sync.
                </p>
                <div className="mt-6 grid gap-3 sm:grid-cols-2">
                  <a
                    href={CricLinks.matches}
                    target="_blank"
                    rel="noreferrer"
                    className="shine-button inline-flex min-h-12 items-center justify-center gap-2 rounded-full bg-gold px-5 text-sm font-black uppercase tracking-[0.16em] text-night"
                  >
                    Open Matches <Icon.ExternalLink size={16} />
                  </a>
                  <a
                    href={CricLinks.members}
                    target="_blank"
                    rel="noreferrer"
                    className="inline-flex min-h-12 items-center justify-center gap-2 rounded-full border border-white/15 bg-white/7 px-5 text-sm font-black uppercase tracking-[0.16em] text-white transition hover:border-gold/55 hover:text-gold"
                  >
                    Open Members <Icon.ExternalLink size={16} />
                  </a>
                </div>
              </div>
            </div>
          </PanelShell>
        );
      }

      function MembersPanel() {
        const memberTiles = [
          { initials: "KW", role: "Official Squad", label: "CricHeroes roster" },
          { initials: "BAT", role: "Batting Unit", label: "Open member page" },
          { initials: "ALL", role: "All-rounders", label: "Verified profiles" },
          { initials: "BWL", role: "Bowling Unit", label: "Team members" },
        ];

        return (
          <PanelShell>
            <div className="grid gap-5 lg:grid-cols-[0.9fr_1.1fr]">
              <div className="glass rounded-[8px] p-6">
                <p className="text-xs font-black uppercase tracking-[0.26em] text-cyan">Members</p>
                <h3 className="mt-3 font-display text-5xl font-black uppercase leading-none text-white">Warriors Roster Wall</h3>
                <p className="mt-5 leading-8 text-white/68">
                  The official player list stays on CricHeroes. This CricKuru panel is designed to showcase verified player profiles once the final member names are added.
                </p>
                <a
                  href={CricLinks.members}
                  target="_blank"
                  rel="noreferrer"
                  className="mt-7 inline-flex min-h-12 items-center justify-center gap-2 rounded-full bg-gold px-6 text-sm font-black uppercase tracking-[0.16em] text-night transition hover:scale-[1.03]"
                >
                  Open Official Members <Icon.ExternalLink size={16} />
                </a>
              </div>
              <div className="grid gap-4 sm:grid-cols-2">
                {memberTiles.map((member, index) => (
                  <motion.article
                    key={member.role}
                    className="relative overflow-hidden rounded-[8px] border border-white/12 bg-white/[0.045] p-5"
                    initial={{ opacity: 0, y: 18 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ delay: index * 0.08, duration: 0.42, ease }}
                  >
                    <div className="absolute right-[-24px] top-[-24px] h-24 w-24 rounded-full bg-gold/10 blur-2xl" />
                    <div className="grid h-16 w-16 place-items-center rounded-[8px] border border-gold/28 bg-gold/10 font-display text-2xl font-black text-gold">
                      {member.initials}
                    </div>
                    <h4 className="mt-6 font-display text-3xl font-black uppercase text-white">{member.role}</h4>
                    <p className="mt-2 text-sm font-semibold uppercase tracking-[0.16em] text-white/46">{member.label}</p>
                  </motion.article>
                ))}
              </div>
            </div>
          </PanelShell>
        );
      }

      function PulsePanel() {
        const pulses = [
          ["Legacy", "Founding team energy with global platform ambition."],
          ["Competition", "Match cards, score previews and arena-first navigation."],
          ["Community", "Players, teams, tournaments and fans in one premium identity."],
        ];

        return (
          <PanelShell>
            <div className="grid gap-5 md:grid-cols-3">
              {pulses.map(([title, text]) => (
                <article key={title} className="glass rounded-[8px] p-6">
                  <p className="font-display text-5xl font-black uppercase text-gold">{title}</p>
                  <p className="mt-4 leading-8 text-white/68">{text}</p>
                </article>
              ))}
            </div>
          </PanelShell>
        );
      }

      function PlaceholderPage({ title, kicker, description, icon: PageIcon }) {
        return (
          <main className="route-bg page-grain px-5 pb-16 pt-32 sm:px-8">
            <section className="mx-auto max-w-7xl">
              <motion.div
                className="grid min-h-[68vh] items-center gap-10 lg:grid-cols-[0.95fr_1.05fr]"
                initial={{ opacity: 0, y: 26 }}
                animate={{ opacity: 1, y: 0 }}
                transition={{ duration: 0.75, ease }}
              >
                <div>
                  <p className="text-xs font-black uppercase tracking-[0.32em] text-gold">{kicker}</p>
                  <h1 className="mt-5 font-display text-6xl font-black uppercase leading-none text-white sm:text-8xl">{title}</h1>
                  <div className="gold-divider my-7" />
                  <p className="max-w-2xl text-lg leading-8 text-white/68">{description}</p>
                  <div className="mt-8 flex flex-col gap-4 sm:flex-row">
                    <Link
                      to="/"
                      className="shine-button inline-flex min-h-12 items-center justify-center gap-2 rounded-full bg-gold px-6 text-sm font-black uppercase tracking-[0.16em] text-night"
                    >
                      Back Home <Icon.ArrowRight size={16} />
                    </Link>
                    <a
                      href={CricLinks.matches}
                      target="_blank"
                      rel="noreferrer"
                      className="inline-flex min-h-12 items-center justify-center gap-2 rounded-full border border-white/15 bg-white/7 px-6 text-sm font-black uppercase tracking-[0.16em] text-white transition hover:border-gold/55 hover:text-gold"
                    >
                      CricHeroes <Icon.ExternalLink size={16} />
                    </a>
                  </div>
                </div>
                <div className="glass rounded-[8px] p-8">
                  <div className="grid h-24 w-24 place-items-center rounded-[8px] border border-gold/30 bg-gold/10 text-gold">
                    <PageIcon size={46} />
                  </div>
                  <div className="mt-10 grid gap-4">
                    {["Premium dark UI", "Route ready", "CricKuru visual system"].map((item) => (
                      <div key={item} className="flex items-center justify-between rounded-[8px] border border-white/10 bg-white/[0.045] p-4">
                        <span className="font-bold text-white/78">{item}</span>
                        <span className="h-2 w-2 rounded-full bg-gold shadow-[0_0_18px_rgba(244,185,66,0.8)]" />
                      </div>
                    ))}
                  </div>
                </div>
              </motion.div>
            </section>
          </main>
        );
      }

      function Footer() {
        return (
          <footer className="border-t border-white/10 bg-[#030407] px-5 py-10 sm:px-8">
            <div className="mx-auto flex max-w-7xl flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
              <Logo />
              <div className="flex flex-wrap gap-3">
                <a
                  href={CricLinks.matches}
                  target="_blank"
                  rel="noreferrer"
                  className="inline-flex min-h-11 items-center gap-2 rounded-full border border-white/12 px-4 text-sm font-bold text-white/70 transition hover:border-gold/50 hover:text-gold"
                >
                  Matches <Icon.ExternalLink size={15} />
                </a>
                <a
                  href={CricLinks.members}
                  target="_blank"
                  rel="noreferrer"
                  className="inline-flex min-h-11 items-center gap-2 rounded-full border border-white/12 px-4 text-sm font-bold text-white/70 transition hover:border-gold/50 hover:text-gold"
                >
                  Members <Icon.ExternalLink size={15} />
                </a>
              </div>
              <p className="text-sm text-white/45">&copy; 2026 CricKuru. Built for crickuru.com.</p>
            </div>
          </footer>
        );
      }

      function App() {
        const routerBasename = window.location.hostname.endsWith("github.io") ? "/crickuru" : "/";

        return (
          <BrowserRouter basename={routerBasename}>
            <ScrollToTop />
            <PageLoader />
            <Navbar />
            <Routes>
              <Route path="/" element={<LandingPage />} />
              <Route
                path="/arena"
                element={
                  <PlaceholderPage
                    title="CricKuru Arena"
                    kicker="Browser Cricket Challenges"
                    description="The Arena route is ready for cricket games, score challenges and leaderboards. The landing CTA already points here."
                    icon={Icon.Trophy}
                  />
                }
              />
              <Route
                path="/teams"
                element={
                  <PlaceholderPage
                    title="Teams"
                    kicker="Build Your Squad"
                    description="A polished team hub placeholder for squads, captains, communities and team-management workflows."
                    icon={Icon.Shield}
                  />
                }
              />
              <Route
                path="/players"
                element={
                  <PlaceholderPage
                    title="Players"
                    kicker="Cricket Identity"
                    description="A premium player-profile route prepared for stats, badges, match roles and individual cricket journeys."
                    icon={Icon.CircleUserRound}
                  />
                }
              />
              <Route
                path="/tournaments"
                element={
                  <PlaceholderPage
                    title="Tournaments"
                    kicker="Compete Globally"
                    description="A tournament route ready for fixtures, brackets, seasons and community competitions."
                    icon={Icon.Swords}
                  />
                }
              />
              <Route
                path="/community"
                element={
                  <PlaceholderPage
                    title="Community"
                    kicker="Global Cricket Network"
                    description="A community route prepared for fans, clubs, match discussions and CricKuru social moments."
                    icon={Icon.Users}
                  />
                }
              />
              <Route
                path="/login"
                element={
                  <PlaceholderPage
                    title="Join CricKuru"
                    kicker="Account Access"
                    description="A login and signup-intent route with the same premium visual system, ready for authentication later."
                    icon={Icon.LogIn}
                  />
                }
              />
              <Route
                path="*"
                element={
                  <PlaceholderPage
                    title="Page Not Found"
                    kicker="CricKuru"
                    description="This page is not available yet. Use the navigation to return to the CricKuru experience."
                    icon={Icon.Sparkles}
                  />
                }
              />
            </Routes>
          </BrowserRouter>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
